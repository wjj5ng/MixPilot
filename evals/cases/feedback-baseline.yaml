# Feedback Detection 기준 회귀 케이스.
#
# 이 케이스들이 깨지면 의도적 변경이라면 ADR + 이 파일 갱신.
# 그렇지 않으면 DSP 회귀 — 절대 좋지 않음.
#
# 알고리즘: Peak-to-Neighbor Ratio (PNR), Hann 윈도잉.

id: feedback-baseline
description: Feedback DSP의 결정적 회귀 — 순수 톤·무음·잡음 표준 신호.
function_under_test: mixpilot.dsp.feedback.detect_peak_bins

cases:
  - id: feedback-silence
    input:
      kind: silence
      sample_rate: 48000
      num_samples: 1024
    expected:
      result_count: 0

  - id: feedback-pure-1khz-sine
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 1000
      amplitude: 0.5
      num_samples: 1024
    expected:
      # 1000 Hz 근처에 적어도 하나의 peak.
      min_result_count: 1
      strongest_frequency_hz: 1000.0
      strongest_frequency_tolerance_hz: 50.0  # bin resolution ≈ 47 Hz

  - id: feedback-two-tones-500-and-3000
    input:
      kind: sum_of_sines
      sample_rate: 48000
      frequencies_hz: [500, 3000]
      amplitudes: [0.5, 0.5]
      num_samples: 1024
    expected:
      # 두 개의 peak 각각 잡힘.
      min_result_count: 2
      frequencies_hz: [500, 3000]
      frequency_tolerance_hz: 50.0

  - id: feedback-white-noise-rejected
    input:
      kind: white_noise
      sample_rate: 48000
      seed: 42
      amplitude: 0.1
      num_samples: 1024
    expected:
      # 디폴트 PNR 임계(15 dB)에서는 노이즈가 거의 안 잡혀야 함.
      max_result_count: 5

  - id: feedback-below-min-freq-rejected
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 80  # min_frequency_hz=100 미만
      amplitude: 0.5
      num_samples: 1024
    params:
      min_frequency_hz: 100.0
    expected:
      # 80 Hz는 필터링되어 빠짐. 다른 잡음 peak는 있을 수 있음.
      assert: "no peak near 80 Hz"
