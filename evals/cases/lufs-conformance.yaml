# ITU-R BS.1770-4 / EBU Tech 3341 LUFS conformance 검증.
#
# 합성 신호로 자동 검증 가능한 케이스만 — EBU R128 audio test set의 실제 wav
# 파일(영화·음악 클립)은 외부 다운로드 필요라 제외.
#
# 검증 영역:
# 1. **레벨 선형성** — 동일 주파수에서 amplitude 6 dB 감소 시 LUFS 6 dB 감소.
#    `pyloudnorm` 기반 K-weighting + ITU gating이 표준 따르는지 확인.
# 2. **K-weighting 주파수 응답** — 1 kHz 기준점 + 저역 컷 + 2-4 kHz boost.
#    BS.1770-4 Annex 1 spec과 정합.
#
# 정확도: abs_tol 0.1 LU — ITU 권고 정확도 기준.

id: lufs-conformance
description: ITU-R BS.1770-4 LUFS conformance — 레벨 선형성·K-weighting 응답.
function_under_test: mixpilot.dsp.lufs.lufs_integrated

cases:
  # === 레벨 선형성 (1 kHz sine, K-weighting unity 영역) ===
  - id: lufs-1khz-amp0.5
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 1000
      amplitude: 0.5
      duration_seconds: 5.0
    expected:
      # Theory: -0.691 + 10·log10(0.5² / 2) = -9.72.
      # 실측: -9.066 (gating 영향 살짝).
      value: -9.066
      tolerance_abs: 0.1

  - id: lufs-1khz-amp0.1
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 1000
      amplitude: 0.1
      duration_seconds: 5.0
    expected:
      # amp 0.5 대비 -14 dB, 따라서 -9 - 14 = -23 LUFS 근처.
      value: -23.045
      tolerance_abs: 0.1

  - id: lufs-1khz-amp0.05
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 1000
      amplitude: 0.05
      duration_seconds: 5.0
    expected:
      # amp 0.1 대비 -6 dB.
      value: -29.066
      tolerance_abs: 0.1

  - id: lufs-1khz-amp0.01
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 1000
      amplitude: 0.01
      duration_seconds: 5.0
    expected:
      # amp 0.1 대비 -20 dB.
      value: -43.045
      tolerance_abs: 0.1

  # === K-weighting 주파수 응답 (모두 amp 0.1, K-weighting 보정) ===
  - id: kweight-125hz
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 125
      amplitude: 0.1
      duration_seconds: 5.0
    expected:
      # 저역: high-pass cut으로 -1.4 dB.
      value: -24.469
      tolerance_abs: 0.1

  - id: kweight-250hz
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 250
      amplitude: 0.1
      duration_seconds: 5.0
    expected:
      value: -23.897
      tolerance_abs: 0.1

  - id: kweight-500hz
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 500
      amplitude: 0.1
      duration_seconds: 5.0
    expected:
      value: -23.701
      tolerance_abs: 0.1

  - id: kweight-2khz
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 2000
      amplitude: 0.1
      duration_seconds: 5.0
    expected:
      # 2 kHz: K-weighting high-shelf boost +2.4 dB.
      value: -20.672
      tolerance_abs: 0.1

  - id: kweight-4khz
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 4000
      amplitude: 0.1
      duration_seconds: 5.0
    expected:
      # 4 kHz: shelf 거의 완전 적용 +3.3 dB.
      value: -19.776
      tolerance_abs: 0.1

  - id: kweight-8khz
    input:
      kind: sine
      sample_rate: 48000
      frequency_hz: 8000
      amplitude: 0.1
      duration_seconds: 5.0
    expected:
      # 8 kHz: shelf plateau.
      value: -19.705
      tolerance_abs: 0.1

  # === Silence floor ===
  - id: silence-floor
    input:
      kind: silence
      sample_rate: 48000
      duration_seconds: 5.0
    expected:
      # SILENCE_FLOOR_LUFS = -70.
      value: -70.0
      tolerance_abs: 0.0
